services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: go4ride
      POSTGRES_PASSWORD: go4ride
      POSTGRES_DB: go4ride
    ports:
      # Host 5433 avoids conflict with a local Postgres on 5432 (common on macOS)
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go4ride"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
