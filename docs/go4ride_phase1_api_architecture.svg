<svg width="1400" height="920" viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Go4Ride Phase 1 API Architecture</title>
  <desc id="desc">Architecture diagram for Phase 1 rider APIs using FastAPI, PostgreSQL, Redis pub/sub, Maps API, and OTP provider.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#25364a" />
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8a94a6" />
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 15px; fill: #475569; }
      .section-title { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
      .box-title { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 800; fill: #0f172a; }
      .box-text { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #334155; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 12px; fill: #64748b; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #25364a; }
      .pill { font-family: Inter, Arial, sans-serif; font-size: 11px; font-weight: 800; fill: #ffffff; }
      .container { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 24; filter: url(#shadow); }
      .client { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1.5; rx: 18; }
      .api { fill: #ecfdf5; stroke: #22c55e; stroke-width: 1.5; rx: 18; }
      .service { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.2; rx: 14; }
      .data { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 18; }
      .external { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.5; rx: 18; }
      .deferred { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.3; stroke-dasharray: 7 5; rx: 18; }
      .line { stroke: #25364a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #64748b; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8a94a6; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-dashed); }
      .pubsub { stroke: #dc2626; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="920"/>
  <text class="title" x="70" y="64">Go4Ride Phase 1 API Architecture</text>
  <text class="subtitle" x="70" y="92">Rider-first FastAPI backend: OTP auth, location/fare estimate, ride booking REST APIs, and WebSocket ride updates.</text>

  <!-- Clients -->
  <rect class="container" x="60" y="150" width="250" height="250"/>
  <text class="section-title" x="88" y="185">Phase 1 Client</text>
  <rect class="client" x="90" y="220" width="190" height="112"/>
  <text class="box-title" x="123" y="255">Rider Mobile App</text>
  <text class="box-text" x="112" y="282">REST API calls</text>
  <text class="box-text" x="112" y="304">WebSocket ride channel</text>
  <rect x="102" y="345" width="164" height="30" rx="15" fill="#0284c7"/>
  <text class="pill" x="124" y="365">JWT access token</text>

  <!-- API container -->
  <rect class="container" x="390" y="120" width="570" height="520"/>
  <text class="section-title" x="422" y="157">FastAPI Backend /api/v1</text>
  <text class="small" x="422" y="180">Uvicorn workers • OpenAPI contracts • request validation • structured errors</text>

  <rect class="api" x="425" y="215" width="220" height="125"/>
  <text class="box-title" x="457" y="247">REST Routers</text>
  <text class="box-text" x="448" y="275">/auth register/login/OTP</text>
  <text class="box-text" x="448" y="298">/rides estimate/create/cancel</text>
  <text class="box-text" x="448" y="321">/profile /stats /history</text>

  <rect class="api" x="705" y="215" width="220" height="125"/>
  <text class="box-title" x="751" y="247">WebSocket Hub</text>
  <text class="box-text" x="728" y="275">/ws/rides/{ride_id}</text>
  <text class="box-text" x="728" y="298">Authenticated subscriptions</text>
  <text class="box-text" x="728" y="321">Push status events to rider</text>

  <rect class="service" x="425" y="390" width="150" height="125"/>
  <text class="box-title" x="455" y="422">Auth</text>
  <text class="box-text" x="448" y="450">OTP verify</text>
  <text class="box-text" x="448" y="473">JWT issue</text>
  <text class="box-text" x="448" y="496">rate limits</text>

  <rect class="service" x="600" y="390" width="150" height="125"/>
  <text class="box-title" x="632" y="422">Ride</text>
  <text class="box-text" x="622" y="450">create/cancel</text>
  <text class="box-text" x="622" y="473">status events</text>
  <text class="box-text" x="622" y="496">history/details</text>

  <rect class="service" x="775" y="390" width="150" height="125"/>
  <text class="box-title" x="809" y="422">Fare/Geo</text>
  <text class="box-text" x="797" y="450">reverse geocode</text>
  <text class="box-text" x="797" y="473">distance/duration</text>
  <text class="box-text" x="797" y="496">fare rules</text>

  <rect class="service" x="510" y="550" width="330" height="58"/>
  <text class="box-title" x="548" y="584">Core Dependencies: DB session • Redis client • current rider</text>

  <!-- Data -->
  <rect class="container" x="1035" y="150" width="300" height="330"/>
  <text class="section-title" x="1067" y="185">Data Layer</text>

  <rect class="data" x="1075" y="220" width="220" height="105"/>
  <text class="box-title" x="1117" y="253">PostgreSQL 16</text>
  <text class="box-text" x="1098" y="281">users, OTPs, ride_types</text>
  <text class="box-text" x="1098" y="304">fare_rules, rides, events</text>

  <rect class="data" x="1075" y="360" width="220" height="85"/>
  <text class="box-title" x="1137" y="392">Redis 7</text>
  <text class="box-text" x="1098" y="418">rate limits, idempotency</text>
  <text class="box-text" x="1098" y="439">pub/sub channel ride:{id}</text>

  <!-- External -->
  <rect class="container" x="1035" y="535" width="300" height="210"/>
  <text class="section-title" x="1067" y="570">External Providers</text>
  <rect class="external" x="1075" y="603" width="220" height="52"/>
  <text class="box-title" x="1117" y="636">Maps API</text>
  <rect class="external" x="1075" y="675" width="220" height="52"/>
  <text class="box-title" x="1112" y="708">OTP Provider</text>

  <!-- Deferred -->
  <rect class="deferred" x="390" y="705" width="945" height="120"/>
  <text class="section-title" x="425" y="742">Deferred after Phase 1</text>
  <text class="box-text" x="425" y="773">Driver app APIs • Redis GEO nearby drivers • matching worker • accept/reject • arrived/start/end trip • admin APIs • payments</text>
  <rect x="425" y="790" width="145" height="28" rx="14" fill="#94a3b8"/>
  <text class="pill" x="452" y="809">Phase 2 / 3</text>

  <!-- Arrows -->
  <path class="line" d="M280 258 C330 258 360 258 425 258"/>
  <text class="label" x="314" y="246">REST HTTPS</text>

  <path class="line" d="M280 305 C350 335 625 195 705 260"/>
  <text class="label" x="339" y="323">WebSocket</text>

  <path class="thin" d="M645 278 L705 278"/>
  <text class="label" x="660" y="267">events</text>

  <path class="thin" d="M535 340 L500 390"/>
  <path class="thin" d="M535 340 L675 390"/>
  <path class="thin" d="M535 340 L850 390"/>
  <path class="thin" d="M815 340 L850 390"/>
  <path class="thin" d="M500 515 L620 550"/>
  <path class="thin" d="M675 515 L675 550"/>
  <path class="thin" d="M850 515 L730 550"/>

  <path class="line" d="M840 580 C930 580 970 285 1075 285"/>
  <text class="label" x="902" y="335">SQLAlchemy async</text>

  <path class="pubsub" d="M840 590 C960 610 970 405 1075 405"/>
  <text class="label" x="898" y="538">publish / subscribe</text>

  <path class="pubsub" d="M1075 425 C992 455 998 296 925 296"/>
  <text class="label" x="958" y="468">fan out status updates</text>

  <path class="line" d="M925 453 C980 520 1008 625 1075 625"/>
  <text class="label" x="980" y="590">geocode + distance</text>

  <path class="line" d="M500 390 C690 660 955 700 1075 700"/>
  <text class="label" x="712" y="682">send / verify OTP</text>

  <path class="dash" d="M675 640 L675 705"/>
  <text class="label" x="696" y="679">same foundation later</text>

  <!-- Mini flow -->
  <rect x="60" y="465" width="250" height="250" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text class="section-title" x="88" y="500">Phase 1 API Flow</text>
  <circle cx="102" cy="535" r="12" fill="#0284c7"/><text class="pill" x="98" y="539">1</text><text class="box-text" x="124" y="540">OTP auth → JWT</text>
  <circle cx="102" cy="577" r="12" fill="#0284c7"/><text class="pill" x="98" y="581">2</text><text class="box-text" x="124" y="582">Reverse geocode</text>
  <circle cx="102" cy="619" r="12" fill="#0284c7"/><text class="pill" x="98" y="623">3</text><text class="box-text" x="124" y="624">Estimate fare</text>
  <circle cx="102" cy="661" r="12" fill="#0284c7"/><text class="pill" x="98" y="665">4</text><text class="box-text" x="124" y="666">Create/cancel ride</text>
  <circle cx="102" cy="703" r="12" fill="#0284c7"/><text class="pill" x="98" y="707">5</text><text class="box-text" x="124" y="708">WS status updates</text>

  <!-- Legend -->
  <text class="small" x="70" y="870">Legend: solid lines = Phase 1 runtime calls • red lines = Redis pub/sub real-time path • dashed = deferred reuse path.</text>
</svg>
