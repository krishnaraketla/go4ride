<svg width="1600" height="1320" viewBox="0 0 1600 1320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fbfbfd; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .entity { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 14; }
      .entity-muted { fill: #f9fafb; stroke: #6b7280; stroke-width: 2; rx: 14; stroke-dasharray: 8 5; }
      .header { fill: #111827; rx: 14; }
      .header-muted { fill: #6b7280; rx: 14; }
      .header-text { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .field { font: 14px Arial, sans-serif; fill: #111827; }
      .field-muted { font: 14px Arial, sans-serif; fill: #6b7280; }
      .pk { font: 700 14px Arial, sans-serif; fill: #111827; }
      .note { font: 13px Arial, sans-serif; fill: #6b7280; }
      .rel { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rel-muted { stroke: #9ca3af; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-muted); }
      .label { font: 13px Arial, sans-serif; fill: #374151; font-weight: 700; }
      .status-box { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 12; }
      .status-text { font: 15px Arial, sans-serif; fill: #1e1b4b; font-weight: 700; }
      .status-arrow { stroke: #4338ca; stroke-width: 2; fill: none; marker-end: url(#arrow-status); }
      .badge { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 10; }
      .badge-text { font: 13px Arial, sans-serif; fill: #065f46; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9ca3af" />
    </marker>
    <marker id="arrow-status" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4338ca" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1320"/>
  <text class="title" x="60" y="62">Rider Phase 1 — Core Data Model</text>
  <text class="subtitle" x="60" y="92">Driver/admin/payment fields are nullable or stubbed. Ride lifecycle enum is the single source of truth for REST, WebSocket, and notifications.</text>

  <!-- User -->
  <rect class="entity" x="60" y="145" width="360" height="315"/>
  <rect class="header" x="60" y="145" width="360" height="48"/>
  <text class="header-text" x="80" y="176">User</text>
  <text class="pk" x="80" y="225">PK id</text>
  <text class="field" x="80" y="252">phone UNIQUE</text>
  <text class="field" x="80" y="279">email nullable</text>
  <text class="field" x="80" y="306">name</text>
  <text class="field" x="80" y="333">role enum: rider | driver | admin</text>
  <text class="field" x="80" y="360">is_blocked boolean</text>
  <text class="field" x="80" y="387">created_at</text>
  <text class="field" x="80" y="414">updated_at</text>
  <rect class="badge" x="80" y="432" width="132" height="22"/>
  <text class="badge-text" x="92" y="448">Phase 1: rider</text>

  <!-- OTP -->
  <rect class="entity" x="60" y="525" width="360" height="245"/>
  <rect class="header" x="60" y="525" width="360" height="48"/>
  <text class="header-text" x="80" y="556">OTPVerification</text>
  <text class="field" x="80" y="606">phone</text>
  <text class="field" x="80" y="633">code_hash</text>
  <text class="field" x="80" y="660">expires_at</text>
  <text class="field" x="80" y="687">purpose enum: login | register</text>
  <text class="field" x="80" y="714">created_at</text>
  <text class="note" x="80" y="747">Used before/around User creation.</text>

  <!-- RefreshToken -->
  <rect class="entity-muted" x="60" y="835" width="360" height="215"/>
  <rect class="header-muted" x="60" y="835" width="360" height="48"/>
  <text class="header-text" x="80" y="866">RefreshToken</text>
  <text class="pk" x="80" y="916">PK id</text>
  <text class="field-muted" x="80" y="943">user_id FK nullable</text>
  <text class="field-muted" x="80" y="970">token_hash</text>
  <text class="field-muted" x="80" y="997">expires_at</text>
  <text class="field-muted" x="80" y="1024">revoked_at nullable</text>
  <text class="note" x="80" y="1047">Optional blacklist table for logout.</text>

  <!-- RideType -->
  <rect class="entity" x="610" y="145" width="350" height="245"/>
  <rect class="header" x="610" y="145" width="350" height="48"/>
  <text class="header-text" x="630" y="176">RideType</text>
  <text class="pk" x="630" y="225">PK id</text>
  <text class="field" x="630" y="252">name: mini | sedan</text>
  <text class="field" x="630" y="279">description nullable</text>
  <text class="field" x="630" y="306">is_active</text>
  <text class="field" x="630" y="333">created_at</text>
  <text class="field" x="630" y="360">updated_at</text>
  <text class="note" x="630" y="381">Seed data for rider MVP.</text>

  <!-- FareRule -->
  <rect class="entity" x="1190" y="145" width="350" height="270"/>
  <rect class="header" x="1190" y="145" width="350" height="48"/>
  <text class="header-text" x="1210" y="176">FareRule</text>
  <text class="pk" x="1210" y="225">PK id</text>
  <text class="field" x="1210" y="252">ride_type_id FK</text>
  <text class="field" x="1210" y="279">base_fare</text>
  <text class="field" x="1210" y="306">per_km_rate</text>
  <text class="field" x="1210" y="333">per_min_rate</text>
  <text class="field" x="1210" y="360">minimum_fare</text>
  <text class="field" x="1210" y="387">is_active</text>
  <text class="note" x="1210" y="406">Admin-managed later.</text>

  <!-- Ride -->
  <rect class="entity" x="520" y="475" width="570" height="430"/>
  <rect class="header" x="520" y="475" width="570" height="48"/>
  <text class="header-text" x="540" y="506">Ride</text>
  <text class="pk" x="540" y="555">PK id</text>
  <text class="field" x="540" y="582">rider_id FK → User.id</text>
  <text class="field" x="540" y="609">driver_id FK → User.id nullable/stubbed</text>
  <text class="field" x="540" y="636">ride_type_id FK → RideType.id</text>
  <text class="field" x="540" y="663">status enum: requested | searching_driver | driver_assigned | driver_arrived | in_progress | completed | cancelled</text>
  <text class="field" x="540" y="690">pickup_lat, pickup_lng, pickup_address</text>
  <text class="field" x="540" y="717">drop_lat, drop_lng, drop_address</text>
  <text class="field" x="540" y="744">estimated_fare</text>
  <text class="field" x="540" y="771">final_fare nullable</text>
  <text class="field" x="540" y="798">requested_at</text>
  <text class="field" x="540" y="825">searching_driver_at nullable</text>
  <text class="field" x="540" y="852">driver_assigned_at / arrived_at / started_at nullable</text>
  <text class="field" x="540" y="879">completed_at / cancelled_at nullable</text>
  <rect class="badge" x="540" y="896" width="245" height="24"/>
  <text class="badge-text" x="552" y="913">Phase 1 API stops early</text>

  <!-- RideStatusEvent -->
  <rect class="entity" x="1190" y="510" width="350" height="300"/>
  <rect class="header" x="1190" y="510" width="350" height="48"/>
  <text class="header-text" x="1210" y="541">RideStatusEvent</text>
  <text class="pk" x="1210" y="590">PK id</text>
  <text class="field" x="1210" y="617">ride_id FK</text>
  <text class="field" x="1210" y="644">from_status nullable</text>
  <text class="field" x="1210" y="671">to_status</text>
  <text class="field" x="1210" y="698">actor_user_id FK nullable</text>
  <text class="field" x="1210" y="725">event_type nullable</text>
  <text class="field" x="1210" y="752">metadata_json nullable</text>
  <text class="field" x="1210" y="779">created_at</text>
  <text class="note" x="1210" y="801">Audit trail + WS/notification source.</text>

  <!-- Payment -->
  <rect class="entity-muted" x="1190" y="870" width="350" height="205"/>
  <rect class="header-muted" x="1190" y="870" width="350" height="48"/>
  <text class="header-text" x="1210" y="901">Payment</text>
  <text class="pk" x="1210" y="950">PK id</text>
  <text class="field-muted" x="1210" y="977">ride_id FK</text>
  <text class="field-muted" x="1210" y="1004">amount</text>
  <text class="field-muted" x="1210" y="1031">status nullable/stubbed</text>
  <text class="note" x="1210" y="1055">Phase 3 stub, not rider MVP.</text>

  <!-- Relationships -->
  <path class="rel" d="M420 300 C470 300, 470 600, 520 600"/>
  <text class="label" x="438" y="442">User 1 → many Rides as rider</text>

  <path class="rel-muted" d="M420 355 C485 355, 470 625, 520 625"/>
  <text class="label" x="432" y="392">User 1 → many Rides as driver nullable</text>

  <path class="rel-muted" d="M240 835 L240 780"/>
  <text class="label" x="265" y="810">User → tokens optional</text>

  <path class="rel" d="M960 260 C1035 260, 1105 260, 1190 260"/>
  <text class="label" x="1010" y="245">RideType 1 → many FareRules</text>

  <path class="rel" d="M785 390 C785 430, 785 440, 785 475"/>
  <text class="label" x="805" y="440">RideType 1 → many Rides</text>

  <path class="rel" d="M1090 650 C1125 650, 1150 650, 1190 650"/>
  <text class="label" x="1118" y="635">Ride 1 → many events</text>

  <path class="rel-muted" d="M1090 790 C1135 790, 1150 960, 1190 970"/>
  <text class="label" x="1112" y="845">Ride 1 → Payment stub</text>

  <!-- Status lifecycle (below entity boxes to avoid overlap) -->
  <text class="title" x="520" y="1145" style="font-size:24px">Ride status lifecycle</text>
  <rect class="status-box" x="520" y="1178" width="125" height="46"/>
  <text class="status-text" x="544" y="1207">requested</text>

  <path class="status-arrow" d="M645 1201 L700 1201"/>
  <rect class="status-box" x="700" y="1178" width="165" height="46"/>
  <text class="status-text" x="721" y="1207">searching_driver</text>

  <path class="status-arrow" d="M865 1201 L920 1201"/>
  <rect class="status-box" x="920" y="1178" width="165" height="46"/>
  <text class="status-text" x="941" y="1207">driver_assigned</text>

  <path class="status-arrow" d="M1085 1201 L1140 1201"/>
  <rect class="status-box" x="1140" y="1178" width="145" height="46"/>
  <text class="status-text" x="1160" y="1207">driver_arrived</text>

  <path class="status-arrow" d="M1285 1201 L1340 1201"/>
  <rect class="status-box" x="1340" y="1178" width="130" height="46"/>
  <text class="status-text" x="1362" y="1207">in_progress</text>

  <path class="status-arrow" d="M1405 1224 C1405 1260, 1260 1260, 1260 1230"/>
  <rect class="status-box" x="1195" y="1242" width="130" height="46"/>
  <text class="status-text" x="1225" y="1271">completed</text>

  <path class="status-arrow" d="M782 1224 C782 1260, 930 1260, 930 1230"/>
  <rect class="status-box" x="870" y="1242" width="125" height="46"/>
  <text class="status-text" x="899" y="1271">cancelled</text>

  <text class="note" x="520" y="1310">Phase 1 rider MVP can support requested → searching_driver → cancelled while still emitting WS transition events.</text>
</svg>
