<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fare Quote — Go4Ride</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; background: #f9f9f9; max-width: 960px; margin: 0 auto; }
    h2 { color: #333; }
    .route-info { background: #fff; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .route-info p { margin: 4px 0; color: #555; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    th { background: #4CAF50; color: white; padding: 10px 14px; text-align: left; font-size: 13px; }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
    tr.unavailable td { color: #aaa; background: #fafafa; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge.yes { background: #e8f5e9; color: #388e3c; }
    .badge.no { background: #fce4ec; color: #c62828; }
    .note { font-size: 12px; color: #888; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>🚗 Fare Quote</h2>
  <div class="route-info" id="route-info"></div>
  <table>
    <thead>
      <tr>
        <th>Ride Type</th>
        <th>Description</th>
        <th id="fare-header">Fare</th>
        <th>Pickup ETA</th>
        <th>Trip Duration</th>
        <th>Drivers Nearby</th>
        <th>Available</th>
      </tr>
    </thead>
    <tbody id="options-body"></tbody>
  </table>
  <p class="note">Sample data from <code>POST /api/v1/rides/quote</code> — open this file to preview the Postman Visualize tab layout.</p>

  <script>
    const res = {
      success: true,
      message: "Ride quote calculated",
      data: {
        pickup_address: "MG Road, Bengaluru, Karnataka, India",
        drop_address: "Koramangala, Bengaluru, Karnataka, India",
        route: { distance_km: "5.20", duration_min: "18.00" },
        currency: "INR",
        surge_multiplier: "1.00",
        quote_expires_at: "2026-06-02T10:35:00Z",
        options: [
          { slug: "bike", name: "Go4 Bike", description: "Quick bike rides", available: true, drivers_nearby: 3, estimated_fare: "89.00", pickup_eta_min: 3, trip_duration_min: 18 },
          { slug: "mini", name: "Go4 Mini", description: "Affordable compact rides", available: true, drivers_nearby: 1, estimated_fare: "120.00", pickup_eta_min: 5, trip_duration_min: 18 },
          { slug: "sedan", name: "Go4 Sedan", description: "Comfortable sedan rides", available: true, drivers_nearby: 2, estimated_fare: "145.00", pickup_eta_min: 7, trip_duration_min: 18 },
          { slug: "xl", name: "Go4 XL", description: "Spacious XL rides", available: false, drivers_nearby: 0, estimated_fare: "185.00", pickup_eta_min: null, trip_duration_min: 18 }
        ]
      }
    };

    const data = res.data;

    document.getElementById("route-info").innerHTML = `
      <p><strong>From:</strong> ${data.pickup_address}</p>
      <p><strong>To:</strong> ${data.drop_address}</p>
      <p><strong>Distance:</strong> ${data.route.distance_km} km &nbsp;|&nbsp; <strong>Duration:</strong> ${data.route.duration_min} min &nbsp;|&nbsp; <strong>Surge:</strong> ${data.surge_multiplier}x</p>
    `;
    document.getElementById("fare-header").textContent = `Fare (${data.currency})`;

    document.getElementById("options-body").innerHTML = data.options.map(opt => `
      <tr class="${opt.available ? "" : "unavailable"}">
        <td><strong>${opt.name}</strong></td>
        <td>${opt.description ?? "—"}</td>
        <td>${opt.estimated_fare}</td>
        <td>${opt.pickup_eta_min != null ? opt.pickup_eta_min + " min" : "—"}</td>
        <td>${opt.trip_duration_min} min</td>
        <td>${opt.drivers_nearby}</td>
        <td><span class="badge ${opt.available ? "yes" : "no"}">${opt.available ? "Yes" : "No"}</span></td>
      </tr>
    `).join("");
  </script>
</body>
</html>
